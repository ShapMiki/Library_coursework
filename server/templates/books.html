<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог книг</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
background:linear-gradient(135deg,#fffdf6,#fff8e6);
color:#5c4a1a;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
}

.logo{
font-size:22px;
font-weight:600;
color:#b8891e;
}

.search-box{
width:300px;
}

.search-box input{
width:100%;
padding:10px 14px;
border-radius:10px;
border:1px solid #f2dca0;
background:white;
}

.search-box input:focus{
outline:none;
border-color:#f2c94c;
box-shadow:0 0 6px rgba(240,180,40,0.3);
}

.profile{
font-size:14px;
}

main{
padding:40px 60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:30px;
}

.book-card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
transition:all 0.25s;
}

.book-card:hover{
transform:translateY(-5px);
box-shadow:0 12px 28px rgba(240,180,40,0.25);
}

.book-cover{
height:180px;
background:#fff4cc;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
margin-bottom:15px;
}

.book-title{
font-weight:600;
margin-bottom:6px;
}

.book-author{
font-size:14px;
color:#8b6a1a;
margin-bottom:10px;
}

.book-year{
font-size:13px;
color:#9a874f;
}

</style>
</head>

<body>

<header>

<div class="logo">
📚 Library Registry
</div>

<div class="search-box">
    <input type="text" placeholder="Поиск книг...">
    </div>

    <div class="profile">
        <a href="/page/book/form">Добавить книгу</a>
    Профиль
    </div>

</header>

<main>

<div class="grid">

{% for book in data.books %}

<a href="/page/book/form/{{book.id}}"><div class="book-card">

    <div class="book-cover">
        📖
    </div>

    <div class="book-title">
        {{ book.title }}
    </div>

    <div class="book-author">
        {{ book.author }}
    </div>

    <div class="book-year">
        {{ book.genre }}
    </div>

</div></a>

{% endfor %}
</div>


</main>

</body>
</html>

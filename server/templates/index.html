<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Library Registry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
background:linear-gradient(135deg,#fffdf6,#fff8e6);
color:#5c4a1a;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
}

.logo{
font-size:22px;
font-weight:600;
color:#b8891e;
}

.nav-buttons a{
text-decoration:none;
margin-left:14px;
padding:10px 18px;
border-radius:10px;
font-size:14px;
font-weight:500;
transition:all 0.25s ease;
}

.login{
border:2px solid #f6d88c;
color:#8b6a1a;
background:white;
}

.login:hover{
background:#fff6d6;
box-shadow:0 6px 18px rgba(240,180,40,0.25);
transform:translateY(-2px);
}

.register{
background:#f6d88c;
color:#5c4a1a;
}

.register:hover{
background:#f2c94c;
box-shadow:0 10px 22px rgba(240,180,40,0.35);
transform:translateY(-2px);
}

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.hero{
text-align:center;
max-width:720px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
font-weight:600;
}

.hero p{
font-size:18px;
margin-bottom:40px;
color:#7a6227;
}

.cta{
display:flex;
justify-content:center;
gap:20px;
}

.cta a{
text-decoration:none;
padding:14px 28px;
border-radius:12px;
font-weight:500;
transition:all 0.25s ease;
}

.cta-login{
border:2px solid #f6d88c;
background:white;
color:#7a5b12;
}

.cta-login:hover{
background:#fff6d6;
box-shadow:0 10px 22px rgba(240,180,40,0.25);
transform:translateY(-3px);
}

.cta-register{
background:#f6d88c;
color:#5c4a1a;
}

.cta-register:hover{
background:#f2c94c;
box-shadow:0 12px 26px rgba(240,180,40,0.35);
transform:translateY(-3px);
}

footer{
text-align:center;
padding:25px;
font-size:13px;
color:#a48a4c;
}

</style>
</head>

<body>

<header>

<div class="logo">
📚 Library Registry
</div>

<div class="nav-buttons">
<a href="/page/login" class="login">Вход</a>
<a href="/page/registration" class="register">Регистрация</a>
</div>

</header>

<main>

<div class="hero">

<h1>Система учёта библиотечных книг</h1>

<p>
Удобная онлайн-платформа для управления библиотекой,
каталогом книг и читателями.
</p>

<div class="cta">
<a href="/page/login" class="cta-login">Войти</a>
<a href="/page/registration" class="cta-register">Создать аккаунт</a>
</div>

</div>

</main>

<footer>
Library Registry • FastAPI
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление книгой</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #fffdf6, #fff8e6); color: #5c4a1a; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 60px; }
        .logo { font-size: 22px; font-weight: 600; color: #b8891e; text-decoration: none; }
        main { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .form-card { width: 420px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .form-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #b8891e; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #f2dca0; font-size: 14px; transition: 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #f2c94c; box-shadow: 0 0 6px rgba(240,180,40,0.2); }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }

        .btn-save { background: #f2c94c; color: #5c4a1a; }
        .btn-save:hover { background: #f0b428; }

        .btn-delete {
            background: #fff5f5; color: #cc3333; border: 1px solid #ffcccc; display: none; /* Скрыта по умолчанию */
        }
        .btn-delete:hover { background: #fee2e2; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">📚 Library Registry</a>
    <div><a href="/" style="color: #b8891e; text-decoration: none; font-size: 14px;">← В каталог</a></div>
</header>

<main>
    <div class="form-card">
        <div id="formTitle" class="form-title">Добавить книгу</div>
        <form id="bookForm">
            <div class="form-group">
                <label>Название книги</label>
                <input type="text" name="title" id="title" required>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea name="description" id="description" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>ID автора</label>
                <input type="number" name="author_id" id="author_id">
            </div>

            <div class="form-group">
                <label>ID жанра</label>
                <input type="number" name="genre_id" id="genre_id">
            </div>

            <div class="actions">
                <button type="submit" class="btn-save">Сохранить</button>
                <button type="button" id="deleteBtn" class="btn-delete">Удалить книгу</button>
            </div>
        </form>
    </div>
</main>

<script>
    const bookForm = document.getElementById("bookForm");
    const deleteBtn = document.getElementById("deleteBtn");
    const formTitle = document.getElementById("formTitle");

    // Определяем ID книги из URL (например, /page/book/form/123)
    const pathParts = window.location.pathname.split('/');
    const bookId = pathParts[pathParts.length - 1];
    const isEdit = bookId && !isNaN(bookId);

    // Если это редактирование, меняем интерфейс
    if (isEdit) {
        formTitle.innerText = "Редактировать книгу";
        deleteBtn.style.display = "block";
        // Здесь можно добавить fetch, чтобы предзаполнить поля данными книги
    }

    // Сохранение (Создание или Обновление)
    bookForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(bookForm);
        const payload = {
            title: formData.get("title"),
            description: formData.get("description"),
            author_id: parseInt(formData.get("author_id")) || null,
            genre_id: parseInt(formData.get("genre_id")) || null
        };

        // Если редактируем, отправляем на эндпоинт редактирования (или метод PUT/PATCH)
        // Если создаем — на обычный POST
        const url = isEdit ? `/api/book/edit` : `/api/book/`;
        const method = "POST"; // В твоем route.py для edit стоит @router.post("/edit")

        if (isEdit) payload.id = parseInt(bookId);

        const response = await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(isEdit ? { book_data: [payload] } : payload)
        });

        if (response.ok) {
            window.location.href = "/";
        } else {
            alert("Ошибка при сохранении");
        }
    });

    // Удаление
    deleteBtn.addEventListener("click", async () => {
        if (!confirm("Вы точно хотите удалить эту книгу?")) return;

        const response = await fetch(`/api/book/${bookId}`, {
            method: "DELETE"
        });

        if (response.ok) {
            alert("Книга удалена");
            window.location.href = "/";
        } else {
            alert("Не удалось удалить книгу");
        }
    });
</script>

</body>
</html>

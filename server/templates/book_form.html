<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Добавить книгу</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#fffdf6,#fff8e6);
color:#5c4a1a;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
}

.logo{
font-size:22px;
font-weight:600;
color:#b8891e;
}

main{
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.form-card{
width:420px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.form-title{
font-size:20px;
font-weight:600;
margin-bottom:20px;
color:#b8891e;
}

.form-group{
margin-bottom:16px;
}

.form-group label{
display:block;
font-size:14px;
margin-bottom:6px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:10px 12px;
border-radius:10px;
border:1px solid #f2dca0;
font-size:14px;
}

.form-group input:focus,
.form-group textarea:focus{
outline:none;
border-color:#f2c94c;
box-shadow:0 0 6px rgba(240,180,40,0.3);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#f2c94c;
color:#5c4a1a;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#f0b428;
}

</style>
</head>

<body>

<header>

<div class="logo">
📚 Library Registry
</div>

<div>
<a href="/">← Назад в каталог</a>
</div>

</header>

<main>

<div class="form-card">

<div class="form-title">
Добавить книгу
</div>

<form id="bookForm">

<div class="form-group">
<label>Название книги</label>
<input type="text" name="title" required>
</div>

<div class="form-group">
<label>Описание</label>
<textarea name="description"></textarea>
</div>

<div class="form-group">
<label>ID автора</label>
<input type="number" name="author_id">
</div>

<div class="form-group">
<label>ID жанра</label>
<input type="number" name="genre_id">
</div>

<button type="submit">
Добавить книгу
</button>

</form>

</div>

</main>

<script>

document.getElementById("bookForm").addEventListener("submit", async function(e){

e.preventDefault()

const formData = new FormData(this)

const data = {
title: formData.get("title"),
description: formData.get("description"),
author_id: formData.get("author_id") || null,
genre_id: formData.get("genre_id") || null
}

const response = await fetch("/api/book",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

if(response.ok){
window.location.href = "/"
}else{
alert("Ошибка при добавлении книги")
}

})

</script>

</body>
</html>

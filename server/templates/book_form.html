<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление книгой</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #fffdf6, #fff8e6); color: #5c4a1a; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 60px; }
        .logo { font-size: 22px; font-weight: 600; color: #b8891e; text-decoration: none; }
        main { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .form-card { width: 420px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .form-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #b8891e; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 6px; font-weight: 500; }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #f2dca0; font-size: 14px; transition: 0.2s;
            background: white; outline: none; color: #5c4a1a;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #f2c94c; box-shadow: 0 0 6px rgba(240,180,40,0.2);
        }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }

        .btn-save { background: #f2c94c; color: #5c4a1a; }
        .btn-save:hover { background: #f0b428; }

        .btn-delete {
            background: #fff5f5; color: #cc3333; border: 1px solid #ffcccc;
            display: none;
        }
        .btn-delete:hover { background: #fee2e2; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">📚 Library Registry</a>
    <div><a href="/" style="color: #b8891e; text-decoration: none; font-size: 14px;">← В каталог</a></div>
</header>

<main>
    <div class="form-card">
        <div id="formTitle" class="form-title">Добавить книгу</div>
        <form id="bookForm">
            <div class="form-group">
                <label>Название книги</label>
                <input type="text" name="title" id="title" required>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea name="description" id="description" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Автор</label>
                <select name="author_id" id="author_id">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Жанр</label>
                <select name="genre_id" id="genre_id">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <div class="actions">
                <button type="submit" class="btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</main>

<script>
    const bookForm = document.getElementById("bookForm");
    const deleteBtn = document.getElementById("deleteBtn");
    const formTitle = document.getElementById("formTitle");

    const pathParts = window.location.pathname.split('/');
    const bookId = pathParts[pathParts.length - 1];
    const isEdit = bookId && !isNaN(bookId);

    // Загрузка авторов (в value кладем ID)
    async function loadAuthors() {
        const select = document.getElementById("author_id");
        try {
            const response = await fetch('/api/author/all');
            const authors = await response.json();
            select.innerHTML = '<option value="">Выберите автора...</option>';
            authors.forEach(a => {
                const opt = document.createElement("option");
                opt.value = a.id; // Здесь ID (например, 35)
                opt.textContent = a.name;
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }

    // Загрузка жанров (в value кладем ID)
    async function loadGenres() {
        const select = document.getElementById("genre_id");
        try {
            const response = await fetch('/api/genre/all');
            const genres = await response.json();
            select.innerHTML = '<option value="">Выберите жанр...</option>';
            genres.forEach(g => {
                const opt = document.createElement("option");
                opt.value = g.id; // Здесь ID (например, 36)
                opt.textContent = g.name;
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }

    async function init() {
        await Promise.all([loadAuthors(), loadGenres()]);
        if (isEdit) {
            formTitle.innerText = "Редактировать книгу";
            if (deleteBtn) deleteBtn.style.display = "block";
            // В режиме редактирования можно добавить fetch для предзаполнения
        }
    }

    init();

    bookForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(bookForm);

        // ВАЖНО: берем значения как есть, они будут строками (String)
        const payload = {
            title: formData.get("title"),
            description: formData.get("description"),
            author_id: formData.get("author_id"),
            genre_id: formData.get("genre_id")
        };

        const url = isEdit ? `/api/book/edit` : `/api/book/`;

        // ID книги для редактирования тоже превращаем в строку на всякий случай
        if (isEdit) payload.id = String(bookId);

        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(isEdit ? { book_data: [payload] } : payload)
        });

        if (response.ok) {
            window.location.href = "/";
        } else {
            alert("Ошибка при сохранении");
        }
    });

    if (deleteBtn) {
        deleteBtn.addEventListener("click", async () => {
            if (!confirm("Удалить книгу?")) return;
            const response = await fetch(`/api/book/${bookId}`, { method: "DELETE" });
            if (response.ok) window.location.href = "/";
        });
    }
</script>

</body>
</html>

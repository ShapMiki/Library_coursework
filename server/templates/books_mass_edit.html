<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Редактирование книг</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#fffdf6,#fff8e6);
color:#5c4a1a;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
}

.logo{
font-size:22px;
font-weight:600;
color:#b8891e;
}

main{
padding:40px 60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.card input,
.card textarea{
width:100%;
margin-top:6px;
margin-bottom:10px;
padding:8px;
border-radius:8px;
border:1px solid #f2dca0;
}

.save-btn{
margin-top:30px;
padding:14px;
border:none;
border-radius:10px;
background:#f2c94c;
font-weight:600;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<header>
<div class="logo">📚 Library Registry</div>
<a href="/">Назад</a>
</header>

<main>

<div class="grid">

{% for book in data.books %}

<div class="card book-form">

<input type="hidden" class="id" value="{{book.id}}">

<label>Название</label>
<input class="title" value="{{book.title}}">

<label>Описание</label>
<textarea class="description">{{book.description}}</textarea>

<label>Автор ID</label>
<input class="author_id" type="number" value="{{book.author_id}}">

<label>Жанр ID</label>
<input class="genre_id" type="number" value="{{book.genre_id}}">

</div>

{% endfor %}

</div>

<button class="save-btn" onclick="saveAll()">
Сохранить все книги
</button>

</main>

<script>

async function saveAll(){

const forms = document.querySelectorAll(".book-form")

let books = []

forms.forEach(form=>{

books.push({
id: form.querySelector(".id").value,
title: form.querySelector(".title").value,
description: form.querySelector(".description").value,
author_id: form.querySelector(".author_id").value || null,
genre_id: form.querySelector(".genre_id").value || null
})

})

const response = await fetch("/api/book/edit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
book_data:books
})
})

if(response.ok){
alert("Книги обновлены")
location.reload()
}else{
alert("Ошибка")
}

}

</script>

</body>
</html>

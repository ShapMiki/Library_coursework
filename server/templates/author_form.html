<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить автора</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Стили полностью идентичны book_form.html для единообразия */
        * { margin:0; padding:0; box-sizing:border-box; font-family:Inter,sans-serif; }
        body { background:linear-gradient(135deg,#fffdf6,#fff8e6); color:#5c4a1a; min-height:100vh; }
        header { display:flex; justify-content:space-between; align-items:center; padding:25px 60px; }
        .logo { font-size:22px; font-weight:600; color:#b8891e; }
        main { display:flex; justify-content:center; align-items:center; padding:40px; }
        .form-card { width:420px; background:white; padding:30px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
        .form-title { font-size:20px; font-weight:600; margin-bottom:20px; color:#b8891e; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:14px; margin-bottom:6px; }
        .form-group input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #f2dca0; font-size:14px; }
        .form-group input:focus { outline:none; border-color:#f2c94c; box-shadow:0 0 6px rgba(240,180,40,0.3); }
        button { width:100%; padding:12px; border:none; border-radius:10px; background:#f2c94c; color:#5c4a1a; font-weight:600; cursor:pointer; transition:0.2s; }
        button:hover { background:#f0b428; }
    </style>
</head>
<body>
<header>
    <div class="logo">📚 Library Registry</div>
    <div><a href="/">← Назад в каталог</a></div>
</header>
<main>
    <div class="form-card">
        <div class="form-title">Добавить автора</div>
        <form id="authorForm">
            <div class="form-group">
                <label>Имя автора</label>
                <input type="text" name="name" placeholder="Напр: Лев Толстой" required>
            </div>
            <button type="submit">Сохранить автора</button>
        </form>
    </div>
</main>
<script>
    document.getElementById("authorForm").addEventListener("submit", async function(e){
        e.preventDefault();
        const formData = new FormData(this);
        const data = {
            name: formData.get("name")
        };

        // Отправляем запрос на создание автора
        const response = await fetch("/api/author", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("Автор успешно добавлен!");
            window.location.href = "/"; // Или на страницу списка авторов
        } else {
            alert("Ошибка при добавлении автора");
        }
    });
</script>
</body>
</html>

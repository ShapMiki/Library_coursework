<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование книги</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #fffdf6, #fff8e6); color: #5c4a1a; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 60px; }
        .logo { font-size: 22px; font-weight: 600; color: #b8891e; text-decoration: none; }
        .back-link { text-decoration: none; color: #b8891e; font-size: 14px; font-weight: 500; }
        main { display: flex; justify-content: center; padding: 20px 40px 40px 40px; }
        .form-card { width: 500px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }

        .record-nav { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 25px; }
        .btn-nav {
            flex: 1; padding: 12px 2px; font-size: 10px; font-weight: 700; text-transform: uppercase;
            color: #ccc; background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px;
            text-align: center; text-decoration: none; cursor: default; transition: all 0.2s;
        }
        .btn-nav.active { color: #b8891e; background: #fff; border-color: #b8891e; cursor: pointer; }
        .btn-nav.active:hover { background: #b8891e; color: #fff; }

        .form-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #b8891e; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; text-transform: uppercase; color: #9a874f; margin-bottom: 6px; }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid #f2dca0; background: #fffcf5; outline: none; font-size: 14px;
            color: #5c4a1a;
        }

        .dynamic-field { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-remove { color: #d9534f; cursor: pointer; font-weight: bold; padding: 5px; }
        .add-field { background: #fff4cc; border: 1px dashed #b8891e; padding: 10px; cursor: pointer; width: 100%; border-radius: 10px; color: #5c4a1a; margin-top: 5px; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-save { background: #f2c94c; color: #5c4a1a; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-delete { background: #fff0f0; color: #d9534f; border: 1px solid #f5c6cb; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">📚 Library Registry</a>
    <a href="/" class="back-link">← Назад к списку</a>
</header>

<main>
    <div class="form-card">
        <div class="record-nav">
            <a id="btn-first" class="btn-nav">« Первая</a>
            <a id="btn-prev" class="btn-nav">‹ Пред.</a>
            <a id="btn-next" class="btn-nav">След. ›</a>
            <a id="btn-last" class="btn-nav">Последняя »</a>
        </div>

        <div class="form-title">Редактировать книгу #{{ data.book.id }}</div>

        <form id="editForm">
            <input type="hidden" id="book_id_input" value="{{ data.book.id }}">

            <div class="form-group"><label>Название</label><input type="text" id="title" required></div>
            <div class="form-group"><label>Описание</label><textarea id="description" rows="4"></textarea></div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Автор</label>
                    <select id="author_select">
                        <option value="">Загрузка...</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Жанр</label>
                    <select id="genre_select">
                        <option value="">Загрузка...</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Доп. поля</label>
                <div id="extraFields"></div>
                <button type="button" class="add-field" onclick="addField()">+ Добавить поле</button>
            </div>

            <div class="action-buttons">
                <button type="submit" class="btn-save">💾 Сохранить изменения</button>
                <button type="button" class="btn-delete" onclick="deleteBook()">🗑️ Удалить запись</button>
            </div>
        </form>
    </div>
</main>

<script>
    const currentBookGenreId = "{{ data.book.genre_id }}";
    const currentBookAuthorId = "{{ data.book.author_id }}";

    // 1. ЗАГРУЗКА АВТОРОВ
    async function loadAuthors() {
        const select = document.getElementById("author_select");
        try {
            const response = await fetch('/api/author/all');
            if (!response.ok) throw new Error('Ошибка сети');
            const authors = await response.json();
            select.innerHTML = '<option value="">Выберите автора...</option>';

            authors.forEach(a => {
                const opt = document.createElement("option");
                opt.value = a.id;
                opt.textContent = a.name;
                if (a.id == currentBookAuthorId) opt.selected = true;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error(e);
            select.innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }

    // 2. ЗАГРУЗКА ЖАНРОВ
    async function loadGenres() {
        const select = document.getElementById("genre_select");
        try {
            const response = await fetch('/api/genre/all');
            if (!response.ok) throw new Error('Ошибка сети');
            const genres = await response.json();
            select.innerHTML = '<option value="">Выберите жанр...</option>';

            genres.forEach(g => {
                const opt = document.createElement("option");
                opt.value = g.id;
                opt.textContent = g.name;
                if (g.id == currentBookGenreId) opt.selected = true;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error(e);
            select.innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }

    function getCurrentId() {
        const el = document.getElementById("book_id_input");
        return el ? parseInt(el.value) : null;
    }

    async function initNavigation() {
        const bookId = getCurrentId();
        if (!bookId) return;
        try {
            const res = await fetch(`/api/book/ids/${bookId}`);
            if (!res.ok) return;
            const ids = await res.json();
            const buttons = [
                { id: 'btn-first', target: ids.first },
                { id: 'btn-prev', target: ids.prev },
                { id: 'btn-next', target: ids.next },
                { id: 'btn-last', target: ids.last }
            ];
            buttons.forEach(btn => {
                const el = document.getElementById(btn.id);
                if (btn.target && btn.target !== 0 && btn.target !== bookId) {
                    el.href = `/page/book/form/${btn.target}`;
                    el.classList.add('active');
                } else {
                    el.href = "javascript:void(0)";
                    el.classList.remove('active');
                }
            });
        } catch (err) { console.error(err); }
    }

    function addField(k = '', v = '') {
        const div = document.createElement("div");
        div.className = "dynamic-field";
        div.innerHTML = `
            <input type="text" class="field-name" placeholder="Ключ" value="${k}" style="flex:1; padding:8px; border-radius:8px; border:1px solid #f2dca0;">
            <input type="text" class="field-value" placeholder="Значение" value="${v}" style="flex:1; padding:8px; border-radius:8px; border:1px solid #f2dca0;">
            <span class="btn-remove" onclick="this.parentElement.remove()">×</span>
        `;
        document.getElementById("extraFields").appendChild(div);
    }

    function setupForm() {
        document.getElementById("title").value = "{{ data.book.title }}";
        document.getElementById("description").value = `{{ data.book.description or '' }}`;
        const extraRaw = '{{ data.book.extra_data | tojson | safe }}';
        try {
            const extra = JSON.parse(extraRaw || '{}');
            const container = document.getElementById("extraFields");
            container.innerHTML = '';
            Object.entries(extra).forEach(([k, v]) => addField(k, v));
        } catch (e) { console.error("Ошибка парсинга", e); }
    }

    async function deleteBook() {
        const id = getCurrentId();
        if (confirm("Удалить книгу?") && id) {
            const res = await fetch(`/api/book/${id}`, { method: 'DELETE' });
            if (res.ok) window.location.href = "/";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        setupForm();
        initNavigation();
        loadGenres();
        loadAuthors(); // Загружаем список авторов
    });

    document.getElementById("editForm").onsubmit = async (e) => {
        e.preventDefault();
        const extra = {};
        document.querySelectorAll(".dynamic-field").forEach(f => {
            const k = f.querySelector(".field-name").value.trim();
            const v = f.querySelector(".field-value").value.trim();
            if (k) extra[k] = v;
        });

        const payload = {
            book_data: [{
                id: getCurrentId(),
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                author_id: parseInt(document.getElementById("author_select").value) || null, // Берем ID из селекта
                genre_id: parseInt(document.getElementById("genre_select").value) || null,
                extra_data: extra
            }]
        };

        const res = await fetch("/api/book/edit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            window.location.href = "/";
        } else {
            alert("Ошибка при сохранении!");
        }
    };
</script>
</body>
</html>
